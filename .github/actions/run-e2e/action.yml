name: 'Run E2E (TestSprite-style)'
description: 'Run E2E by priority, publish outputs, PR annotations, optional blocking'
inputs:
  testsprite-api-key:
    description: 'Compatibility input (not used for local runner)'
    required: false
  base_url:
    description: 'Base URL under test'
    required: true
  priority:
    description: 'High,Medium,Low or P0,P1,P2 (comma-separated). Empty = all'
    required: false
    default: ''
  github-token:
    description: 'GitHub token used to post PR summary and create issues'
    required: false
  blocking:
    description: 'When true, fail step if any tests failed'
    required: false
    default: 'false'
  e2e-user-email:
    description: 'E2E login email'
    required: false
  e2e-user-password:
    description: 'E2E login password'
    required: false
outputs:
  total_tests:
    description: 'Total number of tests run'
    value: ${{ steps.summary.outputs.total_tests }}
  passed_tests:
    description: 'Number of passed tests'
    value: ${{ steps.summary.outputs.passed_tests }}
  failed_tests:
    description: 'Number of failed tests'
    value: ${{ steps.summary.outputs.failed_tests }}
  pass_rate:
    description: 'Pass rate percentage'
    value: ${{ steps.summary.outputs.pass_rate }}
  result_url:
    description: 'GitHub Actions run URL'
    value: ${{ steps.meta.outputs.result_url }}
  summary_json:
    description: 'Path to standardized run summary JSON'
    value: ${{ steps.summary.outputs.summary_json }}
runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Install Playwright Chromium
      shell: bash
      run: npx playwright install --with-deps chromium

    - name: Validate required secrets
      shell: bash
      run: |
        if [[ -z "${{ inputs.base_url }}" ]]; then
          echo "Missing required input: base_url"
          exit 1
        fi
        if [[ -z "${{ inputs.e2e-user-email }}" || -z "${{ inputs.e2e-user-password }}" ]]; then
          echo "Missing E2E credentials. Set secrets E2E_USER_EMAIL and E2E_USER_PASSWORD in repo settings."
          exit 1
        fi

    - name: Run E2E by priority
      shell: bash
      env:
        STAGING_URL: ${{ inputs.base_url }}
        PRIORITY: ${{ inputs.priority }}
        E2E_USER_EMAIL: ${{ inputs.e2e-user-email }}
        E2E_USER_PASSWORD: ${{ inputs.e2e-user-password }}
      run: |
        RUN_ID="${{ github.run_id }}-${{ github.run_attempt }}"
        echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
        RUN_ID="$RUN_ID" PRIORITY="${PRIORITY}" bash e2e/scripts/run-by-priority.sh

    - name: Build result URL
      id: meta
      shell: bash
      run: |
        echo "result_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

    - name: Build standardized run summary
      id: summary
      shell: bash
      run: |
        while IFS= read -r line; do
          echo "$line" >> "$GITHUB_OUTPUT"
        done < <(node e2e/scripts/build-run-summary.mjs "$RUN_ID" "${{ steps.meta.outputs.result_url }}")

    - name: Build failure details markdown
      id: failed_md
      shell: bash
      run: |
        node -e '
          const fs = require("fs");
          const p = `reports/e2e/${process.env.RUN_ID}/run-summary.json`;
          const j = JSON.parse(fs.readFileSync(p, "utf8"));
          const rows = (j.failedCases || []).slice(0,8).map((f,i)=>`${i+1}. **${f.caseId}** [${f.classification}] (${f.ownerHint})\\n   - ${String(f.error||"n/a").replace(/\n/g," ").slice(0,220)}`);
          const md = rows.length ? rows.join("\\n") : "No failed cases.";
          fs.writeFileSync(`reports/e2e/${process.env.RUN_ID}/failed-cases.md`, md);
        '
        echo "failed_cases_md=reports/e2e/${RUN_ID}/failed-cases.md" >> "$GITHUB_OUTPUT"

    - name: Upsert PR summary + annotations
      if: ${{ inputs.github-token != '' && github.event_name == 'pull_request' }}
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- e2e-run-action-summary -->';
          const failedMd = fs.readFileSync('${{ steps.failed_md.outputs.failed_cases_md }}', 'utf8');
          const body = `${marker}
          ## 🤖 E2E Run Summary
          - Total: **${{ steps.summary.outputs.total_tests }}**
          - Passed: **${{ steps.summary.outputs.passed_tests }}**
          - Failed: **${{ steps.summary.outputs.failed_tests }}**
          - Pass rate: **${{ steps.summary.outputs.pass_rate }}%**
          - Priority: ${{ inputs.priority || 'all' }}
          - Result: ${{ steps.meta.outputs.result_url }}

          ### Top Failed Cases
          ${failedMd}
          `;

          const {owner, repo} = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
          } else {
            await github.rest.issues.createComment({owner, repo, issue_number, body});
          }

    - name: Create or update failure issue (non-PR)
      if: ${{ inputs.github-token != '' && github.event_name != 'pull_request' && steps.summary.outputs.failed_tests != '0' }}
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const summary = JSON.parse(fs.readFileSync('${{ steps.summary.outputs.summary_json }}', 'utf8'));
          const branch = context.ref.replace('refs/heads/','');
          const title = `[E2E][AUTO] Failures on ${branch}`;
          const lines = summary.failedCases.slice(0,15).map((f, i) => `${i+1}. ${f.caseId} [${f.classification}] (${f.ownerHint}) - ${String(f.error || 'n/a').replace(/\n/g, ' ').slice(0, 240)}`);
          const body = [
            'Automated E2E failure issue (Phase 2 routing).',
            '',
            `- Run URL: ${{ steps.meta.outputs.result_url }}`,
            `- Total: ${summary.totals.total}`,
            `- Passed: ${summary.totals.passed}`,
            `- Failed: ${summary.totals.failed}`,
            `- Pass rate: ${summary.totals.passRate}%`,
            '',
            '## Failed Cases',
            ...(lines.length ? lines : ['- none'])
          ].join('\n');

          const {owner, repo} = context.repo;
          const labels = ['e2e-failure', 'auto-generated'];
          const issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open', per_page: 100, labels: 'e2e-failure' });
          const existing = issues.find(i => i.title === title);
          if (existing) {
            await github.rest.issues.update({ owner, repo, issue_number: existing.number, body, labels });
          } else {
            await github.rest.issues.create({ owner, repo, title, body, labels });
          }

    - name: Enforce blocking gate
      if: ${{ inputs.blocking == 'true' && steps.summary.outputs.failed_tests != '0' }}
      shell: bash
      run: |
        echo "Blocking mode enabled and failed_tests=${{ steps.summary.outputs.failed_tests }}"
        exit 1
