name: 'Run E2E (TestSprite-style)'
description: 'Run E2E by priority, publish outputs, optional PR comment, optional blocking'
inputs:
  testsprite-api-key:
    description: 'Compatibility input (not used for local runner)'
    required: false
  base_url:
    description: 'Base URL under test'
    required: true
  priority:
    description: 'High,Medium,Low or P0,P1,P2 (comma-separated). Empty = all'
    required: false
    default: ''
  github-token:
    description: 'GitHub token used to post PR summary comment'
    required: false
  blocking:
    description: 'When true, fail step if any tests failed'
    required: false
    default: 'false'
outputs:
  total_tests:
    description: 'Total number of tests run'
    value: ${{ steps.metrics.outputs.total_tests }}
  passed_tests:
    description: 'Number of passed tests'
    value: ${{ steps.metrics.outputs.passed_tests }}
  failed_tests:
    description: 'Number of failed tests'
    value: ${{ steps.metrics.outputs.failed_tests }}
  result_url:
    description: 'GitHub Actions run URL'
    value: ${{ steps.meta.outputs.result_url }}
runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Install Playwright Chromium
      shell: bash
      run: npx playwright install --with-deps chromium

    - name: Run E2E by priority
      id: run
      shell: bash
      env:
        STAGING_URL: ${{ inputs.base_url }}
        PRIORITY: ${{ inputs.priority }}
      run: |
        RUN_ID="${{ github.run_id }}-${{ github.run_attempt }}"
        echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
        RUN_ID="$RUN_ID" PRIORITY="${PRIORITY}" bash e2e/scripts/run-by-priority.sh

    - name: Collect run metrics
      id: metrics
      shell: bash
      run: |
        while IFS= read -r line; do
          echo "$line" >> "$GITHUB_OUTPUT"
        done < <(bash e2e/scripts/collect-metrics.sh "$RUN_ID")

    - name: Build result URL
      id: meta
      shell: bash
      run: |
        echo "result_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

    - name: Upsert PR summary comment
      if: ${{ inputs.github-token != '' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const marker = '<!-- e2e-run-action-summary -->';
          const body = `${marker}
          ## 🤖 E2E Run Summary
          - Total: **${{ steps.metrics.outputs.total_tests }}**
          - Passed: **${{ steps.metrics.outputs.passed_tests }}**
          - Failed: **${{ steps.metrics.outputs.failed_tests }}**
          - Priority: `${{ inputs.priority || 'all' }}`
          - Result: ${{ steps.meta.outputs.result_url }}
          `;

          const {owner, repo} = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number, per_page: 100
          });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
          } else {
            await github.rest.issues.createComment({owner, repo, issue_number, body});
          }

    - name: Enforce blocking gate
      if: ${{ inputs.blocking == 'true' && steps.metrics.outputs.failed_tests != '0' }}
      shell: bash
      run: |
        echo "Blocking mode enabled and failed_tests=${{ steps.metrics.outputs.failed_tests }}"
        exit 1
