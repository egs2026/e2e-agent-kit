name: e2e-weekly-summary

on:
  schedule:
    - cron: "0 2 * * 1" # Mondays 02:00 UTC
  workflow_dispatch:

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create weekly QA summary issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            const title = `[Weekly QA] E2E health summary (${today})`;
            const body = [
              'Automated weekly summary placeholder.',
              '',
              'Please update with:',
              '- P0 pass trend',
              '- P1/P2 pass trend',
              '- Flaky test count',
              '- Top 3 failure causes',
              '- Action items'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['qa-weekly']
            });
