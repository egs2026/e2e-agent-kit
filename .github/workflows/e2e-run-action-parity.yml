name: e2e-run-action-parity

on:
  workflow_dispatch:
    inputs:
      priority:
        description: 'Priority filter: High,Medium,Low or P0,P1,P2'
        required: false
        default: 'High,Medium'
      blocking:
        description: 'Fail workflow if tests fail'
        required: false
        default: 'true'
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E (parity wrapper)
        id: e2e
        uses: ./.github/actions/run-e2e
        with:
          base_url: ${{ secrets.STAGING_URL }}
          priority: ${{ github.event.inputs.priority || 'High,Medium' }}
          blocking: ${{ github.event.inputs.blocking || 'true' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ github.run_id }}
          path: reports/e2e/
          if-no-files-found: ignore

      - name: Echo outputs
        if: always()
        run: |
          echo "total_tests=${{ steps.e2e.outputs.total_tests }}"
          echo "passed_tests=${{ steps.e2e.outputs.passed_tests }}"
          echo "failed_tests=${{ steps.e2e.outputs.failed_tests }}"
          echo "pass_rate=${{ steps.e2e.outputs.pass_rate }}"
          echo "result_url=${{ steps.e2e.outputs.result_url }}"
          echo "summary_json=${{ steps.e2e.outputs.summary_json }}"
