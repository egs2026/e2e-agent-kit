name: e2e-run-action-parity

on:
  workflow_dispatch:
    inputs:
      priority:
        description: 'Priority filter: High,Medium,Low or P0,P1,P2'
        required: false
        default: 'High,Medium'
      blocking:
        description: 'Fail workflow if tests fail'
        required: false
        default: 'true'
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets/config
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0

          if [[ -z "${STAGING_URL:-}" ]]; then
            echo "❌ Missing secret: STAGING_URL"
            missing=1
          else
            echo "✅ STAGING_URL present"
          fi

          if [[ -z "${E2E_USER_EMAIL:-}" ]]; then
            echo "❌ Missing secret: E2E_USER_EMAIL"
            missing=1
          else
            echo "✅ E2E_USER_EMAIL present"
          fi

          if [[ -z "${E2E_USER_PASSWORD:-}" ]]; then
            echo "❌ Missing secret: E2E_USER_PASSWORD"
            missing=1
          else
            echo "✅ E2E_USER_PASSWORD present"
          fi

          if [[ $missing -ne 0 ]]; then
            echo "Preflight failed: required secrets are missing."
            exit 1
          fi

          code=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health" || echo "000")
          if [[ "$code" != "200" ]]; then
            echo "❌ STAGING_URL health check failed: ${STAGING_URL}/health -> $code"
            exit 1
          fi

          echo "✅ Preflight passed"

  e2e:
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E (parity wrapper)
        id: e2e
        uses: ./.github/actions/run-e2e
        with:
          base_url: ${{ secrets.STAGING_URL }}
          priority: ${{ github.event.inputs.priority || 'High,Medium' }}
          blocking: ${{ github.event.inputs.blocking || 'true' }}
          e2e-user-email: ${{ secrets.E2E_USER_EMAIL }}
          e2e-user-password: ${{ secrets.E2E_USER_PASSWORD }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ github.run_id }}
          path: reports/e2e/
          if-no-files-found: ignore

      - name: Echo outputs
        if: always()
        run: |
          echo "total_tests=${{ steps.e2e.outputs.total_tests }}"
          echo "passed_tests=${{ steps.e2e.outputs.passed_tests }}"
          echo "failed_tests=${{ steps.e2e.outputs.failed_tests }}"
          echo "pass_rate=${{ steps.e2e.outputs.pass_rate }}"
          echo "result_url=${{ steps.e2e.outputs.result_url }}"
          echo "summary_json=${{ steps.e2e.outputs.summary_json }}"
